services:
  bot-api:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3001}
    ports:
      - "${API_PORT:-3001}:3001"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.API_PORT||3001)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  user-client:
    build:
      context: .
      dockerfile: apps/user-client/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    depends_on:
      bot-api:
        condition: service_healthy

  mini-app:
    build:
      context: .
      dockerfile: apps/mini-app/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${MINI_APP_PORT:-5173}:80"
    restart: unless-stopped
    depends_on:
      bot-api:
        condition: service_healthy
